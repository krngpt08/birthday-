    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Riya!</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #ff9a9e;
            --secondary-color: #fad0c4;
            --text-color: #4a4a4a;
            --pastel-bg: linear-gradient(to top, #fad0c4 0%, #ffd1ff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: var(--pastel-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Background Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            opacity: 0;
            visibility: hidden;
            transition: all 1s ease-in-out;
            transform: translateY(20px);
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* --- SLIDE 1: COUNTDOWN --- */
        #slide-countdown h1 {
            font-size: 5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: pulse 1s infinite;
        }

        /* --- SLIDE 2: PHOTO --- */
        .photo-frame {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 5px solid white;
            transition: transform 0.3s ease;
        }
        .photo-frame:hover { transform: scale(1.02); }

        /* --- SLIDE 3: MESSAGE --- */
        .message-text {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #555;
            background: rgba(255, 255, 255, 0.6);
