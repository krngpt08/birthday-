<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Riya</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:radial-gradient(circle at top,#1a1a40,#000);
color:white;
overflow:hidden;
}

/* card */

.card{
width:320px;
padding:30px;
border-radius:18px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.08);
box-shadow:0 0 40px rgba(0,0,0,0.6);
text-align:center;
}

/* title */

#title{
font-size:34px;
letter-spacing:2px;
opacity:0;
animation:fadeTitle 2s forwards;
}

@keyframes fadeTitle{
to{opacity:1;}
}

/* photo */

.photo{
width:240px;
border-radius:14px;
margin-top:20px;
filter:blur(8px);
animation:clearPhoto 2.5s forwards;
}

@keyframes clearPhoto{
to{filter:blur(0);}
}

/* cake button */

#cake{
margin-top:25px;
padding:10px 18px;
border-radius:10px;
background:#ff4d6d;
cursor:pointer;
display:inline-block;
font-size:18px;
}

#message{
margin-top:20px;
display:none;
font-size:18px;
line-height:1.6;
}

iframe{
margin-top:15px;
display:none;
}

</style>
</head>

<body>

<div class="card">

<div id="title">Happy Birthday Riya</div>

<img src="YOUR_IMAGE_LINK_HERE" class="photo">

<div id="cake" onclick="cutCake()">Cut the Cake</div>

<div id="message">
Happy Birthday to the my Dearest Best friend. ....the only subscriber of a version of me that exists only for you...🙃
</div>

<iframe id="song"
width="250"
height="140"
src="https://www.youtube.com/embed/RbiJXZl2pN0?autoplay=1"
allow="autoplay">
</iframe>

</div>

<script>

function cutCake(){

document.getElementById("message").style.display="block";
document.getElementById("song").style.display="block";

}

</script>

</body>
</html>
