<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Riya!</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <!-- Canvas Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* --- CSS STYLES --- */
        :root {
            --primary-color: #ff9a9e;
            --secondary-color: #fad0c4;
            --text-color: #4a4a4a;
            --pastel-bg: linear-gradient(to top, #fad0c4 0%, #ffd1ff 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background: var(--pastel-bg);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Background Canvas */
        #confetti-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide {
            position: absolute;
            opacity: 0;
            visibility: hidden;
            transition: all 1s ease-in-out;
            transform: translateY(20px);
            width: 90%;
            max-width: 600px;
            padding: 20px;
        }

        .slide.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* --- SLIDE 1: COUNTDOWN --- */
        #slide-countdown h1 {
            font-size: 5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: pulse 1s infinite;
        }

        /* --- SLIDE 2: PHOTO --- */
        .photo-frame {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 5px solid white;
            transition: transform 0.3s ease;
        }
        .photo-frame:hover { transform: scale(1.02); }

        /* --- SLIDE 3: MESSAGE --- */
        .message-text {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #555;
            background: rgba(255, 255, 255, 0.6);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        /* --- SLIDE 4: NAME --- */
        .name-text {
            font-family: 'Dancing Script', cursive;
            font-size: 5rem;
            background: -webkit-linear-gradient(#ff9a9e, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(255, 154, 158, 0.5));
            animation: glow 2s ease-in-out infinite alternate;
        }

        /* --- SLIDE 5: CAKE --- */
        .cake-container { cursor: pointer; transition: transform 0.2s; }
        .cake-container:active { transform: scale(0.95); }
        .cake-img { width: 200px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1)); }

        /* --- START OVERLAY --- */
        #start-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--pastel-bg);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            cursor: pointer;
        }
        #start-overlay h2 { font-size: 2rem; margin-bottom: 20px; color: #fff; }
        .btn {
            padding: 15px 40px;
            background: white;
            color: #ff9a9e;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes glow { from { text-shadow: 0 0 10px rgba(255, 154, 158, 0.3); } to { text-shadow: 0 0 20px rgba(255, 154, 158, 0.8), 0 0 30px rgba(255, 154, 158, 0.6); } }

        @media (max-width: 600px) {
            #slide-countdown h1 { font-size: 3.5rem; }
            .name-text { font-size: 3.5rem; }
            .message-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <!-- Audio Element -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <!-- Start Overlay -->
    <div id="start-overlay">
        <h2>🎉 A Surprise for Riya 🎉</h2>
        <button class="btn" onclick="startExperience()">Click to Open</button>
    </div>

    <!-- Background Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Slide 1: Countdown -->
        <div id="slide-countdown" class="slide">
            <h1 id="countdown-number">5</h1>
            <p style="color: white; margin-top: 10px; font-size: 1.2rem;">Get ready for a special surprise!</p>
        </div>

        <!-- Slide 2: Photo (UPDATED LINK) -->
        <div id="slide-photo" class="slide">
            <!-- Using the direct link format for ImgBB -->
            <img src="https://i.ibb.co/8DS0GRCL/image.jpg" alt="Riya Birthday Photo" class="photo-frame">
        </div>

        <!-- Slide 3: Message -->
        <div id="slide-message" class="slide">
            <div class="message-text">
                "Happy Birthday to my Dearest Best friend. ....the only subscriber of a version of me that exists only for you...🙃"
            </div>
        </div>

        <!-- Slide 4: Name -->
        <div id="slide-name" class="slide">
            <h1 class="name-text">Riya</h1>
        </div>

        <!-- Slide 5: Cake -->
        <div id="slide-cake" class="slide">
            <div class="cake-container" onclick="cutCake()">
                <!-- SVG Cake Icon -->
                <svg class="cake-img" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path fill="#FF9A9E" d="M464 256c0-70.7-57.3-128-128-128h-16V64c0-17.7-14.3-32-32-32H224c-17.7 0-32 14.3-32 32v64h-16c-70.7 0-128 57.3-128 128s57.3 128 128 128h16v64c0 17.7 14.3 32 32 32h64c17.7 0 32-14.3 32-32v-64h16c70.7 0 128-57.3 128-128zm-256 64c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32zm128 0c-17.7 0-32-14.3-32-32s14.3-32 32-32 32 14.3 32 32-14.3 32-32 32z"/>
                </svg>
            </div>
            <p style="margin-top: 20px; font-weight: bold; color: #ff9a9e;">Tap the cake!</p>
        </div>

    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */

        function startExperience() {
            const overlay = document.getElementById('start-overlay');
            const audio = document.getElementById('bg-music');
            
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);

            audio.volume = 0.5;
            audio.play().catch(error => console.log("Audio play failed:", error));

            startCountdown();
        }

        function startCountdown() {
            let count = 5;
            const display = document.getElementById('countdown-number');
            const slide = document.getElementById('slide-countdown');

            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    display.innerText = count;
                } else {
                    clearInterval(timer);
                    display.innerText = "GO!";
                    setTimeout(() => {
                        slide.classList.remove('active');
                        showNextSlide('slide-photo');
                    }, 800);
                }
            }, 1000);
        }

        function showNextSlide(slideId) {
            const currentSlide = document.querySelector('.slide.active');
            const nextSlide = document.getElementById(slideId);

            if (currentSlide) {
                currentSlide.classList.remove('active');
            }
            
            setTimeout(() => {
                nextSlide.classList.add('active');
                if (slideId === 'slide-photo') launchConfetti();
                if (slideId === 'slide-name') launchConfetti();
                if (slideId === 'slide-cake') startFireworks();
            }, 500);
        }

        function cutCake() {
            alert("🎂 Cake Cut! Happy Birthday Riya! 🎉");
            var duration = 3 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        function launchConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff9a9e', '#fad0c4', '#a18cd1', '#fbc2eb']
            });
        }

        function startFireworks() {
            var duration = 15 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) return clearInterval(interval);
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }

        window.onload = function() {
            confetti({ particleCount: 50, spread: 100, origin: { y: 0.6 } });
        };
    </script>
</body>
  </html>
